blueprint:
  name: Gestion Velux et Volet Automatique
  description: >
    Gère automatiquement l'ouverture et la fermeture d'une fenêtre de toit Velux et de son volet
    selon la température intérieure, un vrai capteur de température extérieure, la consigne de
    thermostat, la nuit, et la tendance de température intérieure.
  domain: automation
  input:
    velux_window:
      name: Fenêtre Velux
      selector:
        entity:
          domain: cover
    velux_blind:
      name: Volet Velux
      selector:
        entity:
          domain: cover
    thermostat:
      name: Thermostat de la pièce
      selector:
        entity:
          domain: climate
    indoor_temp_rising:
      name: Température intérieure en hausse (booléen)
      selector:
        entity:
          domain: binary_sensor
    outdoor_temp_sensor:
      name: Température extérieure réelle
      description: Capteur de température placé à l'extérieur, utilisé à la place de la météo.
      selector:
        entity:
          domain: sensor
          device_class: temperature
    night_start:
      name: Heure de début de nuit
      selector:
        time: {}
    night_end:
      name: Heure de fin de nuit
      selector:
        time: {}
    action_delay:
      name: Délai entre deux actions (en secondes)
      default: 5
      selector:
        number:
          min: 0
          max: 30
          unit_of_measurement: s
          mode: slider
    delta_temperature:
      name: Delta de température pour action (°C)
      description: Ecart entre la température actuelle et la consigne pour déclencher une action
      default: 1
      selector:
        number:
          min: 0
          max: 5
          step: 0.1
          unit_of_measurement: "°C"
          mode: slider
    outdoor_cooling_delta:
      name: Ecart minimum intérieur / extérieur pour ventiler (°C)
      description: La fenêtre ne s'ouvre que si l'extérieur est au moins autant plus frais que l'intérieur.
      default: 1
      selector:
        number:
          min: 0
          max: 5
          step: 0.1
          unit_of_measurement: "°C"
          mode: slider
    window_position_step:
      name: Pas d'ajustement de la fenêtre (%)
      description: Pour éviter les cycles complet ouvert/fermé, la fenêtre bouge de ce pourcentage à chaque correction.
      default: 10
      selector:
        number:
          min: 5
          max: 50
          step: 5
          unit_of_measurement: "%"
          mode: slider

mode: single
max_exceeded: silent

trigger:
  - platform: time_pattern
    minutes: "/10"
  - platform: state
    entity_id: !input thermostat
    for:
      minutes: 5
  - platform: state
    entity_id: !input indoor_temp_rising
    for:
      minutes: 5
  - platform: state
    entity_id: !input outdoor_temp_sensor
    for:
      minutes: 5
  - platform: time
    at: !input night_start
  - platform: time
    at: !input night_end

variables:
  window: !input velux_window
  blind: !input velux_blind
  thermostat: !input thermostat
  temp_rising_entity: !input indoor_temp_rising
  outdoor_sensor: !input outdoor_temp_sensor
  night_start: !input night_start
  night_end: !input night_end
  action_delay: !input action_delay
  delta: !input delta_temperature
  outdoor_delta: !input outdoor_cooling_delta
  window_step: !input window_position_step
  current_temp: "{{ state_attr(thermostat, 'current_temperature') | float(none) }}"
  target_temp: "{{ state_attr(thermostat, 'temperature') | float(none) }}"
  outdoor_temp: "{{ states(outdoor_sensor) | float(none) }}"
  valid_temperatures: "{{ current_temp is not none and target_temp is not none and outdoor_temp is not none }}"
  temp_rising: "{{ is_state(temp_rising_entity, 'on') }}"
  window_state: "{{ states(window) }}"
  blind_state: "{{ states(blind) }}"
  is_heating: "{{ state_attr(thermostat, 'hvac_action') == 'heating' }}"
  window_position: >
    {% set position = state_attr(window, 'current_position') %}
    {% if position is not none %}
      {{ position | int }}
    {% elif window_state in ['open', 'opening'] %}
      100
    {% else %}
      0
    {% endif %}
  next_open_position: >
    {% set next = (window_position | int(0)) + (window_step | int(10)) %}
    {{ [next, 100] | min }}
  next_close_position: >
    {% set next = (window_position | int(0)) - (window_step | int(10)) %}
    {{ [next, 0] | max }}

  is_night: >
    {% set t1 = night_start.split(':') %}
    {% set t2 = night_end.split(':') %}
    {% set ns = now().replace(hour=t1[0]|int, minute=t1[1]|int, second=0, microsecond=0) %}
    {% set ne = now().replace(hour=t2[0]|int, minute=t2[1]|int, second=0, microsecond=0) %}
    {% if ns > ne %}
      {{ now() >= ns or now() < ne }}
    {% else %}
      {{ now() >= ns and now() < ne }}
    {% endif %}

  hot_inside: "{{ valid_temperatures and current_temp > (target_temp + delta) }}"
  target_reached: "{{ valid_temperatures and current_temp <= target_temp }}"
  warming_above_target: "{{ valid_temperatures and current_temp > target_temp and temp_rising }}"
  outdoor_cooler: "{{ valid_temperatures and outdoor_temp <= (current_temp - outdoor_delta) }}"
  outdoor_too_warm: "{{ valid_temperatures and outdoor_temp >= current_temp }}"
  hot_outside_for_shading: "{{ valid_temperatures and outdoor_temp >= (target_temp + delta) }}"
  should_ventilate: "{{ not is_heating and (hot_inside or warming_above_target) and outdoor_cooler }}"

  should_close_blind: >
    {{ valid_temperatures
       and not is_heating
       and blind_state != 'closed'
       and (
         is_night
         or (hot_inside and temp_rising and not outdoor_cooler)
         or (hot_outside_for_shading and current_temp >= target_temp)
       ) }}

  should_open_blind: >
    {{ valid_temperatures
       and not is_heating
       and not is_night
       and not hot_inside
       and not hot_outside_for_shading
       and blind_state != 'open' }}

  should_open_window: >
    {{ should_ventilate and (window_position | int(0)) < 100 }}

  should_close_window: >
    {{ valid_temperatures
       and not is_heating
       and (target_reached or outdoor_too_warm)
       and (window_position | int(0)) > 0 }}

action:
  - choose:
      # --- Si le volet doit être fermé ---
      - conditions:
          - condition: template
            value_template: "{{ should_close_blind }}"
        sequence:
          # Fermer la fenêtre si elle est ouverte
          - if:
              - condition: template
                value_template: "{{ window_state != 'closed' }}"
            then:
              - service: cover.close_cover
                target:
                  entity_id: "{{ window }}"
              - delay:
                  seconds: "{{ action_delay }}"
          # Fermer le volet
          - service: cover.close_cover
            target:
              entity_id: "{{ blind }}"
          # Rouvrir la fenêtre si elle devait rester ouverte
          - if:
              - condition: template
                value_template: "{{ should_ventilate }}"
            then:
              - delay:
                  seconds: "{{ action_delay }}"
              - service: cover.set_cover_position
                target:
                  entity_id: "{{ window }}"
                data:
                  position: "{{ next_open_position }}"

      # --- Si le volet doit être ouvert ---
      - conditions:
          - condition: template
            value_template: "{{ should_open_blind }}"
        sequence:
          - service: cover.open_cover
            target:
              entity_id: "{{ blind }}"

  # --- Gérer indépendamment la fenêtre ---
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ should_open_window }}"
        sequence:
          - service: cover.set_cover_position
            target:
              entity_id: "{{ window }}"
            data:
              position: "{{ next_open_position }}"
      - conditions:
          - condition: template
            value_template: "{{ should_close_window }}"
        sequence:
          - service: cover.set_cover_position
            target:
              entity_id: "{{ window }}"
            data:
              position: "{{ next_close_position }}"
