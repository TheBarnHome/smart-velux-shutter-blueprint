blueprint:
  name: Gestion Velux Automatique
  description: >
    Gère automatiquement l'ouverture et la fermeture d'une fenêtre de toit Velux selon la
    température intérieure, un vrai capteur de température extérieure, et une consigne
    issue d'un thermostat ou d'un réglage manuel.
  domain: automation
  input:
    velux_window:
      name: Fenêtre Velux
      selector:
        entity:
          domain: cover
    thermostat:
      name: Thermostat ou thermomètre intérieur
      description: Entité climate avec température/consigne, ou simple sensor de température.
      selector:
        entity:
          filter:
            - domain: climate
            - domain: sensor
              device_class: temperature
    indoor_temp_rising:
      name: Température intérieure en hausse
      description: Utilisé en journée pour refermer si la pièce recommence à chauffer.
      selector:
        entity:
          domain: binary_sensor
    outdoor_temp_sensor:
      name: Température extérieure réelle
      description: Capteur de température placé à l'extérieur, utilisé à la place de la météo.
      selector:
        entity:
          domain: sensor
          device_class: temperature
    delta_temperature:
      name: Delta de température pour action (°C)
      description: Ecart entre la température actuelle et la consigne pour déclencher une action
      default: 1
      selector:
        number:
          min: 0
          max: 5
          step: 0.1
          unit_of_measurement: "°C"
          mode: slider
    target_temperature:
      name: Température cible si thermomètre simple (°C)
      description: Utilisée quand l'entité intérieure est un sensor, ou si le thermostat n'expose pas de consigne.
      default: 20
      selector:
        number:
          min: 10
          max: 30
          step: 0.5
          unit_of_measurement: "°C"
          mode: slider
    outdoor_cooling_delta:
      name: Ecart minimum intérieur / extérieur pour ventiler (°C)
      description: La fenêtre ne s'ouvre que si l'extérieur est au moins autant plus frais que l'intérieur.
      default: 1
      selector:
        number:
          min: 0
          max: 5
          step: 0.1
          unit_of_measurement: "°C"
          mode: slider
    proportional_band:
      name: Bande proportionnelle de régulation (°C)
      description: Ecart à la consigne qui correspond à 100% d'ouverture. Entre 0 et cet écart, l'ouverture cible est proportionnelle.
      default: 3
      selector:
        number:
          min: 0.5
          max: 10
          step: 0.5
          unit_of_measurement: "°C"
          mode: slider
    window_position_step:
      name: Pas d'ajustement progressif de la fenêtre (%)
      description: Mouvement maximum de la fenêtre à chaque correction, en ouverture comme en fermeture.
      default: 10
      selector:
        number:
          min: 5
          max: 50
          step: 5
          unit_of_measurement: "%"
          mode: slider
    min_window_position:
      name: Ouverture minimale de sécurité de la fenêtre (%)
      description: La fenêtre ne descend jamais sous cette position pour éviter le verrouillage et le bruit.
      default: 7
      selector:
        number:
          min: 7
          max: 20
          step: 1
          unit_of_measurement: "%"
          mode: slider
    window_position_tolerance:
      name: Tolérance avant mouvement de la fenêtre (%)
      description: Ignore les petites différences entre la position actuelle et la position cible.
      default: 3
      selector:
        number:
          min: 0
          max: 10
          step: 1
          unit_of_measurement: "%"
          mode: slider
    debug_logging:
      name: Activer les traces dans le journal
      description: Ajoute un message détaillé dans le Logbook à chaque exécution.
      default: false
      selector:
        boolean: {}

mode: single
max_exceeded: silent

trigger:
  - platform: time_pattern
    minutes: "/10"
  - platform: state
    entity_id: !input thermostat
    for:
      minutes: 5
  - platform: state
    entity_id: !input indoor_temp_rising
    for:
      minutes: 5
  - platform: state
    entity_id: !input outdoor_temp_sensor
    for:
      minutes: 5
  - platform: state
    entity_id: sun.sun

variables:
  window: !input velux_window
  thermostat: !input thermostat
  temp_rising_entity: !input indoor_temp_rising
  outdoor_sensor: !input outdoor_temp_sensor
  delta: !input delta_temperature
  target_temperature_fallback: !input target_temperature
  outdoor_delta: !input outdoor_cooling_delta
  proportional_band: !input proportional_band
  window_step: !input window_position_step
  min_window_position: !input min_window_position
  window_tolerance: !input window_position_tolerance
  debug_logging: !input debug_logging
  thermostat_domain: "{{ thermostat.split('.')[0] }}"
  current_temp: >
    {% if thermostat_domain == 'climate' %}
      {{ state_attr(thermostat, 'current_temperature') | float(none) }}
    {% else %}
      {{ states(thermostat) | float(none) }}
    {% endif %}
  target_temp: >
    {% if thermostat_domain == 'climate' and state_attr(thermostat, 'temperature') is not none %}
      {{ state_attr(thermostat, 'temperature') | float(none) }}
    {% else %}
      {{ target_temperature_fallback | float(none) }}
    {% endif %}
  outdoor_temp: "{{ states(outdoor_sensor) | float(none) }}"
  valid_temperatures: "{{ current_temp is not none and target_temp is not none and outdoor_temp is not none }}"
  temp_rising: "{{ is_state(temp_rising_entity, 'on') }}"
  window_state: "{{ states(window) }}"
  is_heating: "{{ thermostat_domain == 'climate' and state_attr(thermostat, 'hvac_action') == 'heating' }}"
  is_night: "{{ is_state('sun.sun', 'below_horizon') }}"
  window_position: >
    {% set position = state_attr(window, 'current_position') %}
    {% if position is not none %}
      {{ position | int }}
    {% elif window_state in ['open', 'opening'] %}
      100
    {% else %}
      0
    {% endif %}
  safe_min_position: >
    {% if is_night %}
      {{ [min_window_position | int(7), 7] | max }}
    {% else %}
      0
    {% endif %}

  hot_inside: "{{ valid_temperatures and current_temp > (target_temp + delta) }}"
  above_target: "{{ valid_temperatures and current_temp > target_temp }}"
  temperature_error: "{{ (current_temp - target_temp) if valid_temperatures else none }}"
  proportional_ratio: >
    {% if valid_temperatures %}
      {% set ratio = (temperature_error | float(0)) / (proportional_band | float(3)) %}
      {{ [[ratio, 0] | max, 1] | min }}
    {% else %}
      0
    {% endif %}
  effective_outdoor_delta: "{{ outdoor_delta | float(1) }}"
  cooling_margin: "{{ (current_temp - outdoor_temp) if valid_temperatures else none }}"
  outdoor_cooler: "{{ valid_temperatures and outdoor_temp < current_temp }}"
  outdoor_good_for_cooling: "{{ valid_temperatures and outdoor_temp <= (current_temp - (effective_outdoor_delta | float(1))) }}"
  cooling_available: "{{ valid_temperatures and not is_heating and outdoor_good_for_cooling }}"
  useful_strong_cooling: "{{ hot_inside and outdoor_good_for_cooling }}"
  daytime_warming_protection: "{{ valid_temperatures and not is_night and temp_rising and not cooling_available }}"
  desired_window_position: >
    {% set safe_min = safe_min_position | int(7) %}
    {% set target = safe_min %}
    {% if not is_heating and daytime_warming_protection %}
      {% set target = safe_min %}
    {% elif cooling_available %}
      {% if above_target %}
        {% set target = safe_min + ((100 - safe_min) * (proportional_ratio | float(0))) %}
      {% endif %}
    {% elif valid_temperatures and not is_heating and outdoor_cooler %}
      {% set target = window_position | int(safe_min) %}
    {% endif %}
    {{ [[target, safe_min] | max, 100] | min }}
  window_position_gap: "{{ (desired_window_position | int(0)) - (window_position | int(0)) }}"
  next_window_position: >
    {% set current = window_position | int(0) %}
    {% set target = desired_window_position | int(7) %}
    {% set step = window_step | int(10) %}
    {% if target > current %}
      {{ [current + step, target] | min }}
    {% elif target < current %}
      {{ [current - step, target] | max }}
    {% else %}
      {{ current }}
    {% endif %}
  should_adjust_window: "{{ (window_position_gap | int(0) | abs) > (window_tolerance | int(3)) }}"
  should_ventilate: "{{ (desired_window_position | int(7)) > (safe_min_position | int(7)) }}"

  should_open_window: >
    {{ should_adjust_window and (window_position_gap | int(0)) > 0 }}

  should_close_window: >
    {{ should_adjust_window and (window_position_gap | int(0)) < 0 }}

action:
  - if:
      - condition: template
        value_template: "{{ debug_logging }}"
    then:
      - service: logbook.log
        data:
          name: Smart Velux Shutter
          entity_id: "{{ window }}"
          message: >-
            trigger={{ trigger.platform if trigger is defined else 'manual' }};
            current={{ current_temp }}°C;
            target={{ target_temp }}°C;
            outdoor={{ outdoor_temp }}°C;
            window={{ window_position }}%;
            desired={{ desired_window_position }}%;
            next={{ next_window_position }}%;
            safe_min={{ safe_min_position }}%;
            night={{ is_night }};
            heating={{ is_heating }};
            temp_rising={{ temp_rising }};
            temperature_error={{ temperature_error }}°C;
            proportional_band={{ proportional_band }}°C;
            proportional_ratio={{ proportional_ratio }};
            cooling_margin={{ cooling_margin }}°C;
            cooling_available={{ cooling_available }};
            outdoor_cooler={{ outdoor_cooler }};
            outdoor_good_for_cooling={{ outdoor_good_for_cooling }};
            useful_strong_cooling={{ useful_strong_cooling }};
            daytime_warming_protection={{ daytime_warming_protection }};
            hot_inside={{ hot_inside }};
            above_target={{ above_target }};
            open_window={{ should_open_window }};
            close_window={{ should_close_window }}.

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ should_open_window }}"
        sequence:
          - service: cover.set_cover_position
            target:
              entity_id: "{{ window }}"
            data:
              position: "{{ next_window_position }}"
      - conditions:
          - condition: template
            value_template: "{{ should_close_window }}"
        sequence:
          - service: cover.set_cover_position
            target:
              entity_id: "{{ window }}"
            data:
              position: "{{ next_window_position }}"
