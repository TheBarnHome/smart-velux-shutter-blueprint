blueprint:
  name: Gestion Velux et Volet Automatique
  description: >
    Gère automatiquement l'ouverture et la fermeture d'une fenêtre de toit Velux et de son volet
    selon la température intérieure, un vrai capteur de température extérieure, la consigne de
    thermostat, et la tendance de température intérieure.
  domain: automation
  input:
    velux_window:
      name: Fenêtre Velux
      selector:
        entity:
          domain: cover
    velux_blind:
      name: Volet Velux
      selector:
        entity:
          domain: cover
    thermostat:
      name: Thermostat de la pièce
      selector:
        entity:
          domain: climate
    indoor_temp_rising:
      name: Température intérieure en hausse (booléen)
      selector:
        entity:
          domain: binary_sensor
    outdoor_temp_sensor:
      name: Température extérieure réelle
      description: Capteur de température placé à l'extérieur, utilisé à la place de la météo.
      selector:
        entity:
          domain: sensor
          device_class: temperature
    outdoor_temp_rising:
      name: Température extérieure en hausse (optionnel, diagnostic)
      description: Conservé pour observation dans les traces, mais n'influence plus les décisions.
      default: ""
      selector:
        entity:
          domain: binary_sensor
    action_delay:
      name: Délai entre deux actions (en secondes)
      default: 5
      selector:
        number:
          min: 0
          max: 30
          unit_of_measurement: s
          mode: slider
    delta_temperature:
      name: Delta de température pour action (°C)
      description: Ecart entre la température actuelle et la consigne pour déclencher une action
      default: 1
      selector:
        number:
          min: 0
          max: 5
          step: 0.1
          unit_of_measurement: "°C"
          mode: slider
    outdoor_cooling_delta:
      name: Ecart minimum intérieur / extérieur pour ventiler (°C)
      description: La fenêtre ne s'ouvre que si l'extérieur est au moins autant plus frais que l'intérieur.
      default: 1
      selector:
        number:
          min: 0
          max: 5
          step: 0.1
          unit_of_measurement: "°C"
          mode: slider
    window_position_step:
      name: Pas d'ajustement progressif de la fenêtre (%)
      description: Fermeture progressive et petite réouverture près de la consigne. L'ouverture forte va directement à la cible.
      default: 10
      selector:
        number:
          min: 5
          max: 50
          step: 5
          unit_of_measurement: "%"
          mode: slider
    min_window_position:
      name: Ouverture minimale de sécurité de la fenêtre (%)
      description: La fenêtre ne descend jamais sous cette position pour éviter le verrouillage et le bruit.
      default: 7
      selector:
        number:
          min: 7
          max: 20
          step: 1
          unit_of_measurement: "%"
          mode: slider
    window_position_tolerance:
      name: Tolérance avant mouvement de la fenêtre (%)
      description: Ignore les petites différences entre la position actuelle et la position cible.
      default: 3
      selector:
        number:
          min: 0
          max: 10
          step: 1
          unit_of_measurement: "%"
          mode: slider
    debug_logging:
      name: Activer les traces dans le journal
      description: Ajoute un message détaillé dans le Logbook à chaque exécution.
      default: false
      selector:
        boolean: {}

mode: single
max_exceeded: silent

trigger:
  - platform: time_pattern
    minutes: "/10"
  - platform: state
    entity_id: !input thermostat
    for:
      minutes: 5
  - platform: state
    entity_id: !input indoor_temp_rising
    for:
      minutes: 5
  - platform: state
    entity_id: !input outdoor_temp_sensor
    for:
      minutes: 5
  - platform: state
    entity_id: sun.sun

variables:
  window: !input velux_window
  blind: !input velux_blind
  thermostat: !input thermostat
  temp_rising_entity: !input indoor_temp_rising
  outdoor_sensor: !input outdoor_temp_sensor
  outdoor_rising_entity: !input outdoor_temp_rising
  action_delay: !input action_delay
  delta: !input delta_temperature
  outdoor_delta: !input outdoor_cooling_delta
  window_step: !input window_position_step
  min_window_position: !input min_window_position
  window_tolerance: !input window_position_tolerance
  debug_logging: !input debug_logging
  current_temp: "{{ state_attr(thermostat, 'current_temperature') | float(none) }}"
  target_temp: "{{ state_attr(thermostat, 'temperature') | float(none) }}"
  outdoor_temp: "{{ states(outdoor_sensor) | float(none) }}"
  valid_temperatures: "{{ current_temp is not none and target_temp is not none and outdoor_temp is not none }}"
  temp_rising: "{{ is_state(temp_rising_entity, 'on') }}"
  has_outdoor_trend: "{{ outdoor_rising_entity not in [none, ''] }}"
  outdoor_rising: "{{ has_outdoor_trend and is_state(outdoor_rising_entity, 'on') }}"
  outdoor_falling: "{{ has_outdoor_trend and is_state(outdoor_rising_entity, 'off') }}"
  window_state: "{{ states(window) }}"
  blind_state: "{{ states(blind) }}"
  is_heating: "{{ state_attr(thermostat, 'hvac_action') == 'heating' }}"
  is_night: "{{ is_state('sun.sun', 'below_horizon') }}"
  window_position: >
    {% set position = state_attr(window, 'current_position') %}
    {% if position is not none %}
      {{ position | int }}
    {% elif window_state in ['open', 'opening'] %}
      100
    {% else %}
      0
    {% endif %}
  safe_min_position: >
    {% if is_night %}
      {{ [min_window_position | int(7), 7] | max }}
    {% else %}
      0
    {% endif %}

  hot_inside: "{{ valid_temperatures and current_temp > (target_temp + delta) }}"
  above_target: "{{ valid_temperatures and current_temp > target_temp }}"
  strong_cooling_needed: "{{ valid_temperatures and current_temp > (target_temp + ((delta | float(1)) / 2)) }}"
  effective_outdoor_delta: "{{ outdoor_delta | float(1) }}"
  outdoor_cooler: "{{ valid_temperatures and outdoor_temp < current_temp }}"
  outdoor_good_for_cooling: "{{ valid_temperatures and outdoor_temp <= (current_temp - (effective_outdoor_delta | float(1))) }}"
  hot_outside_for_shading: "{{ valid_temperatures and outdoor_temp >= (target_temp + delta) }}"
  desired_window_position: >
    {% set safe_min = safe_min_position | int(7) %}
    {% set target = safe_min %}
    {% if valid_temperatures and not is_heating and outdoor_good_for_cooling %}
      {% if above_target %}
        {% set target = 100 %}
      {% endif %}
    {% elif valid_temperatures and not is_heating and outdoor_cooler %}
      {% set target = window_position | int(safe_min) %}
    {% endif %}
    {{ [[target, safe_min] | max, 100] | min }}
  window_position_gap: "{{ (desired_window_position | int(0)) - (window_position | int(0)) }}"
  next_window_position: >
    {% set current = window_position | int(0) %}
    {% set target = desired_window_position | int(7) %}
    {% set step = window_step | int(10) %}
    {% if target > current %}
      {% if strong_cooling_needed %}
        {{ target }}
      {% else %}
        {{ [current + step, target] | min }}
      {% endif %}
    {% elif target < current %}
      {{ [current - step, target] | max }}
    {% else %}
      {{ current }}
    {% endif %}
  should_adjust_window: "{{ (window_position_gap | int(0) | abs) > (window_tolerance | int(3)) }}"
  should_ventilate: "{{ (desired_window_position | int(7)) > (safe_min_position | int(7)) }}"

  should_close_blind: >
    {{ valid_temperatures
       and not is_heating
       and blind_state != 'closed'
       and (
         (hot_inside and temp_rising and not outdoor_cooler)
         or (hot_outside_for_shading and current_temp >= target_temp)
       ) }}

  should_open_blind: >
    {{ valid_temperatures
       and not is_heating
       and not hot_inside
       and not hot_outside_for_shading
       and blind_state != 'open' }}

  should_open_window: >
    {{ should_adjust_window and (window_position_gap | int(0)) > 0 }}

  should_close_window: >
    {{ should_adjust_window and (window_position_gap | int(0)) < 0 }}

action:
  - if:
      - condition: template
        value_template: "{{ debug_logging }}"
    then:
      - service: logbook.log
        data:
          name: Smart Velux Shutter
          entity_id: "{{ window }}"
          message: >-
            trigger={{ trigger.platform if trigger is defined else 'manual' }};
            current={{ current_temp }}°C;
            target={{ target_temp }}°C;
            outdoor={{ outdoor_temp }}°C;
            window={{ window_position }}%;
            desired={{ desired_window_position }}%;
            next={{ next_window_position }}%;
            safe_min={{ safe_min_position }}%;
            night={{ is_night }};
            heating={{ is_heating }};
            temp_rising={{ temp_rising }};
            outdoor_rising={{ outdoor_rising }};
            outdoor_falling={{ outdoor_falling }};
            outdoor_cooler={{ outdoor_cooler }};
            outdoor_good_for_cooling={{ outdoor_good_for_cooling }};
            hot_inside={{ hot_inside }};
            above_target={{ above_target }};
            strong_cooling_needed={{ strong_cooling_needed }};
            close_blind={{ should_close_blind }};
            open_blind={{ should_open_blind }};
            open_window={{ should_open_window }};
            close_window={{ should_close_window }}.

  - choose:
      # --- Si le volet doit être fermé ---
      - conditions:
          - condition: template
            value_template: "{{ should_close_blind }}"
        sequence:
          # Ramener la fenêtre à sa position de sécurité avant de fermer le volet.
          - if:
              - condition: template
                value_template: "{{ (window_position | int(0)) > (safe_min_position | int(7)) }}"
            then:
              - service: cover.set_cover_position
                target:
                  entity_id: "{{ window }}"
                data:
                  position: "{{ safe_min_position }}"
              - delay:
                  seconds: "{{ action_delay }}"
          # Fermer le volet
          - service: cover.close_cover
            target:
              entity_id: "{{ blind }}"
          # Rouvrir la fenêtre si elle devait rester ouverte
          - if:
              - condition: template
                value_template: "{{ should_ventilate }}"
            then:
              - delay:
                  seconds: "{{ action_delay }}"
              - service: cover.set_cover_position
                target:
                  entity_id: "{{ window }}"
                data:
                  position: "{{ next_window_position }}"

      # --- Si le volet doit être ouvert ---
      - conditions:
          - condition: template
            value_template: "{{ should_open_blind }}"
        sequence:
          - service: cover.open_cover
            target:
              entity_id: "{{ blind }}"

  # --- Gérer indépendamment la fenêtre ---
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ should_open_window }}"
        sequence:
          - service: cover.set_cover_position
            target:
              entity_id: "{{ window }}"
            data:
              position: "{{ next_window_position }}"
      - conditions:
          - condition: template
            value_template: "{{ should_close_window }}"
        sequence:
          - service: cover.set_cover_position
            target:
              entity_id: "{{ window }}"
            data:
              position: "{{ next_window_position }}"
